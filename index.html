<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WuWa Guess Who</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="floating-counter">
        REMAINING: <span id="counter">49</span>/49
    </div>

    <h1>WuWa Guess Who</h1>
    
    <div class="player-area">
        <div id="secret-slot" class="hidden-char empty-slot"></div>
        <button id="reset-btn">Restart Game</button>
        <div id="mode-indicator" style="font-size: 10px; color: #888; margin-top: 5px;">Mode: Default (images)</div>
    </div>

    <div id="board" class="game-board"></div>

    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h2>Restart Game?</h2>
            <p>Your board will be completely reset.</p>
            <div class="modal-buttons">
                <button id="confirm-reset" class="btn-confirm">YES, RESET</button>
                <button id="cancel-reset" class="btn-cancel">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
