<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WuWa Guess Who</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating counter in the top left -->
    <div class="floating-counter">
        REMAINING: <span id="counter">49</span>/49
    </div>

    <h1>WuWa Guess Who</h1>
    
    <div class="player-area">
        <div id="secret-slot" class="hidden-char empty-slot">
            <!-- Text comes from CSS via :after -->
        </div>
        <button id="reset-btn">Restart Game</button>
    </div>

    <div id="board" class="game-board">
        <!-- JavaScript fills this section -->
    </div>

    <!-- The stylish Reset Modal -->
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h2>Restart Game?</h2>
            <p>Your board will be completely reset.</p>
            <div class="modal-buttons">
                <button id="confirm-reset" class="btn-confirm">YES, RESET</button>
                <button id="cancel-reset" class="btn-cancel">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
